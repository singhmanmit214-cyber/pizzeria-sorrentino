 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorrentino POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="table-screen">
        <div class="header">
            <h1>SORRENTINO</h1>
            <p>TISCHAUSWAHL</p>
        </div>
        <div id="table-grid-wrapper">
            <div id="table-grid"></div>
        </div>
    </div>

    <div id="menu-screen">
        <div class="menu-side">
            <div class="top-bar">
                <span id="current-tisch-label"></span>
            </div>
            <div id="sub-nav"></div>
            
            <div id="menu-content-wrapper">
                <div id="menu-display"></div>
            </div>
        </div>

        <div class="receipt-side">
            <h2>RECHNUNG</h2>
            <div id="order-list"></div>
            <div class="total-section">
                <span>TOTAL:</span>
                <span id="total-amount">0.00 €</span>
            </div>
            <button class="action-btn print-btn" onclick="printBon()">BELEG DRUCKEN</button>
            <button class="action-btn back-btn" onclick="renderTables()">ZURÜCK ZU TISCHEN</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
