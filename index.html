 <div id="menu-screen" class="screen" style="display:none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <button onclick="showTables()" class="back-btn">←</button>
            <div id="table-label"></div>
        </div>
        <div class="search-container">
            <input type="text" id="main-search" placeholder="№ oder Name..." onkeyup="searchMenu()">
        </div>
        
        <div class="category-list">
            <div class="cat-card" onclick="openCategory('ESSEN')">
                <div class="cat-icon">🍕</div>
                <div class="cat-info"><b>ESSEN</b><span>Pizza, Pasta, etc.</span></div>
            </div>
            <div class="cat-card" onclick="openCategory('GETRÄNKE')">
                <div class="cat-icon">🍹</div>
                <div class="cat-info"><b>GETRÄNKE</b><span>Alkoholfrei, Bier, Wein</span></div>
            </div>
            <div class="cat-card" onclick="openCategory('VEGAN')">
                <div class="cat-icon">🌿</div>
                <div class="cat-info"><b>VEGAN</b><span>Vegan Pizza & Pasta</span></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="sub-nav" class="sub-tabs"></div>
        <div id="menu-display" class="item-grid"></div>
    </div>
    
    <div class="receipt-side">
        <div id="order-list" class="receipt-items"></div>
        <div class="receipt-footer">
            <div class="total-area">TOTAL: <span id="total-val">0.00 €</span></div>
            <div class="action-btns">
                <button onclick="completeOrder()" class="btn-print">RECHNUNG</button>
            </div>
        </div>
    </div>
</div>
