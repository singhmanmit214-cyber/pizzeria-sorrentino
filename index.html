 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorrentino POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="table-screen">
        <div class="gold-header">
            <h1>SORRENTINO</h1>
            <p>TISCHAUSWAHL</p>
        </div>
        <div id="table-grid">
            </div>
        <div class="admin-bar">
            <button onclick="showDayClosing()">TAGESABSCHLUSS</button>
        </div>
    </div>

    <div id="menu-screen">
        <div class="gold-header">
            <h2 id="current-tisch-display">TISCH 0</h2>
        </div>

        <div id="sub-nav-container"></div>

        <div id="menu-display"></div>

        <div class="gold-footer-bar" onclick="openPayment()">
            <div id="cart-status">0 Positionen</div>
            <div id="cart-total-price">0,00 €</div>
            <div class="kasse-btn">KASSE →</div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
