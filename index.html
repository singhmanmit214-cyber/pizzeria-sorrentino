<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzeria Sorrentino - Tisch-Bestellung</title>
    <style>
        :root { --primary: #d52b1e; --secondary: #008c45; --dark: #333; --light: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--light); padding-bottom: 100px; }
        header { background: var(--primary); color: white; text-align: center; padding: 15px; }
        
        /* Table Selection Screen */
        #tableSelection { padding: 40px 20px; text-align: center; display: block; }
        .btn-main { background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; max-width: 300px; cursor: pointer; }
        
        /* Menu Screen */
        #menuContent { display: none; }
        nav { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        nav button { flex: 1; padding: 15px; border: none; background: none; color: white; font-weight: bold; cursor: pointer; }
        nav button.active { border-bottom: 4px solid var(--secondary); }

        .menu-grid { padding: 15px; }
        .menu-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item-info { flex: 1; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: white; border-top: 2px solid var(--primary); padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
        
        /* Receipt Modal */
        #orderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 15px; }
        .receipt { border: 1px dashed #333; padding: 15px; font-family: monospace; background: #fff; margin-bottom: 20px; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-print { background: #333; color: white; padding: 10px; border: none; border-radius: 5px; }
        .btn-share { background: #25D366; color: white; padding: 10px; border: none; border-radius: 5px; }
        .btn-download { background: #007bff; color: white; padding: 10px; border: none; border-radius: 5px; }

        @media print {
            body * { visibility: hidden; }
            .receipt, .receipt * { visibility: visible; }
            .receipt { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Pizzeria Sorrentino</h1>
</header>

<div id="tableSelection">
    <h2>Willkommen!</h2>
    <p>Wählen Sie Ihren Tisch:</p>
    <select id="tableNumber" style="width: 100%; max-width: 300px; padding: 15px; margin-bottom: 20px; font-size: 1.1rem; border-radius: 10px;">
        <option value="">-- Tisch wählen --</option>
        <script>for(let i=1; i<=15; i++) document.write(`<option value="${i}">Tisch ${i}</option>`);</script>
    </select><br>
    <button class="btn-main" onclick="startOrdering()">Speisekarte öffnen</button>
</div>

<div id="menuContent">
    <nav>
        <button onclick="renderMenu('Getränke')" class="cat-btn" id="btn-Getränke">Getränke</button>
        <button onclick="renderMenu('Pizza')" class="cat-btn" id="btn-Pizza">Pizza</button>
        <button onclick="renderMenu('Pasta')" class="cat-btn" id="btn-Pasta">Pasta</button>
    </nav>

    <div id="menuGrid" class="menu-grid"></div>

    <div class="bottom-bar">
        <div>Tisch: <span id="activeTable"></span><br><strong>Summe: <span id="totalPrice">0.00</span>€</strong></div>
        <button class="btn-main" style="width: auto;" onclick="openOrderSummary()">Bestellung prüfen</button>
    </div>
</div>

<div id="orderModal">
    <div class="modal-content">
        <h2 style="text-align: center;">Ihre Quittung</h2>
        <div id="receipt" class="receipt">
            <center>
                <strong>PIZZERIA SORRENTINO</strong><br>
                Tisch: <span id="receiptTable"></span><br>
                <span id="receiptDate"></span><br>
                --------------------------------
            </center>
            <div id="receiptItems"></div>
            --------------------------------<br>
            <strong>GESAMT: <span id="receiptTotal"></span>€</strong>
        </div>

        <div class="action-btns">
            <button class="btn-print" onclick="window.print()">Drucken 🖨️</button>
            <button class="btn-share" onclick="shareOrder()">Teilen 📲</button>
            <button class="btn-download" onclick="downloadReceipt()" style="grid-column: span 2;">Download (PDF/Text) 📥</button>
            <button style="background: var(--secondary); color: white; grid-column: span 2; padding: 15px; border:none; border-radius: 5px; font-weight:bold; margin-top:10px;" onclick="location.reload()">Neue Bestellung</button>
        </div>
    </div>
</div>

<script>
const menuData = [
    { id: 101, name: "Cola 0.33l", category: "Getränke", price: 3.50, description: "Eiskalt" },
    { id: 102, name: "Wasser 0.5l", category: "Getränke", price: 2.50, description: "Still/Sprudel" },
    { id: 1, name: "Pizza Margherita", category: "Pizza", price: 8.50, description: "Tomaten, Mozzarella" },
    { id: 2, name: "Pizza Salami", category: "Pizza", price: 10.50, description: "Salami vom Rind" },
    { id: 3, name: "Pasta Carbonara", category: "Pasta", price: 12.00, description: "Ei, Speck, Käse" }
];

let cart = [];
let currentTable = "";

function startOrdering() {
    const table = document.getElementById('tableNumber').value;
    if(!table) return alert("Bitte Tisch wählen!");
    currentTable = table;
    document.getElementById('activeTable').innerText = table;
    document.getElementById('tableSelection').style.display = 'none';
    document.getElementById('menuContent').style.display = 'block';
    renderMenu('Pizza');
}

function renderMenu(cat) {
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = '';
    document.querySelectorAll('.cat-btn').forEach(b => b.style.borderBottom = "none");
    document.getElementById('btn-'+cat).style.borderBottom = "4px solid #008c45";

    menuData.filter(i => i.category === cat).forEach(item => {
        grid.innerHTML += `
            <div class="menu-item">
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <p>${item.description}</p>
                    <strong>${item.price.toFixed(2)}€</strong>
                </div>
                <button class="add-btn" onclick="addToCart(${item.id})">+ Hinzufügen</button>
            </div>`;
    });
}

function addToCart(id) {
    cart.push(menuData.find(i => i.id === id));
    document.getElementById('totalPrice').innerText = cart.reduce((s, i) => s + i.price, 0).toFixed(2);
}

function openOrderSummary() {
    if(cart.length === 0) return alert("Warenkorb ist leer!");
    document.getElementById('orderModal').style.display = 'block';
    document.getElementById('receiptTable').innerText = currentTable;
    document.getElementById('receiptDate').innerText = new Date().toLocaleString();
    
    let itemsHtml = "";
    cart.forEach(i => {
        itemsHtml += `<div style="display:flex; justify-content:space-between;"><span>${i.name}</span><span>${i.price.toFixed(2)}€</span></div>`;
    });
    document.getElementById('receiptItems').innerHTML = itemsHtml;
    document.getElementById('receiptTotal').innerText = cart.reduce((s, i) => s + i.price, 0).toFixed(2);
}

function shareOrder() {
    const text = `Bestellung Tisch ${currentTable}: ${cart.map(i => i.name).join(", ")}. Gesamt: ${cart.reduce((s, i) => s + i.price, 0).toFixed(2)}€`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function downloadReceipt() {
    const content = document.getElementById('receipt').innerText;
    const blob = new Blob([content], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Tisch_${currentTable}_Quittung.txt`;
    a.click();
}
</script>
</body>
</html>
