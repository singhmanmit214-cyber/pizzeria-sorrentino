 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorrentino POS Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="table-sidebar">
            <h2 class="logo">SORRENTINO</h2>
            <div id="table-grid"></div>
            <button class="closing-btn" onclick="showDayClosing()">KASSEN-ABSCHLUSS</button>
        </div>

        <div id="menu-side">
            <div class="main-nav">
                <button class="main-cat-btn" onclick="showMainSection('FOOD')">ESSEN</button>
                <button class="main-cat-btn" onclick="showMainSection('VEGAN')">VEGAN</button>
                <button class="main-cat-btn" onclick="showMainSection('DRINKS')">GETRÄNKE</button>
            </div>
            <div id="sub-cat-nav"></div>
            <div id="menu-display"></div>
        </div>

        <div id="cart-side">
            <div class="cart-header">Tisch <span id="active-table-num">1</span></div>
            <div id="cart-items"></div>
            <div class="cart-footer">
                <div class="total-box">Total: <span id="cart-total">0.00</span>€</div>
                <div class="cart-btns">
                    <button class="btn-cancel" onclick="clearTable()">STORNOR</button>
                    <button class="btn-pay" onclick="openPayment()">BILLING</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="overlay" onclick="closeModal(event)">
        <div id="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
