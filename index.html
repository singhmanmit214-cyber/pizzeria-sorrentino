 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorrentino POS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="intro-screen">
        <div class="logo-animation">
            <h1>SORRENTINO</h1>
            <div class="gold-line"></div>
            <p>PIZZERIA - TRATTORIA</p>
        </div>
    </div>

    <div id="table-screen" style="display:none;">
        <div class="small-logo">SORRENTINO</div>
        <h2>Wähle einen Tisch</h2>
        <div class="grid" id="table-grid"></div>
    </div>

    <div id="menu-screen" style="display:none;">
        <header class="pos-header">
            <button class="nav-btn" onclick="showTableScreen()">←</button>
            <div class="table-tag">Tisch <span id="active-table"></span></div>
            <div class="price-tag"><span id="cart-total">0.00</span>€</div>
        </header>

        <div class="category-circles" id="cat-scroll">
            </div>

        <div id="item-list" class="items-container"></div>

        <div class="pos-actions">
            <button class="action-btn p-print" onclick="printReceipt()">Drucken</button>
            <button class="action-btn p-share" onclick="shareReceipt()">Teilen</button>
            <button class="action-btn p-reset" onclick="resetCart()">Löschen</button>
        </div>
    </div>

    <div id="print-layout"></div>

    <script src="script.js"></script>
</body>
</html>
