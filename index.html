<div id="orderForm" style="padding: 20px; background: #f9f9f9; border-radius: 15px; margin: 20px;">
    <h3>Bestelldetails</h3>
    
    <label>Art der Bestellung:</label><br>
    <select id="orderType" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px;">
        <option value="Abholung">Selbstabholung</option>
        <option value="Lieferung">Lieferung</option>
    </select>

    <input type="text" id="customerName" placeholder="Ihr Name" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
    
    <input type="text" id="customerAddress" placeholder="Straße, Hausnummer, PLZ (nur bei Lieferung)" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;">

    <p>Artikel im Warenkorb: <span id="cartCount">0</span></p>
    
    <button onclick="sendOrder()" style="background:#d52b1e; color:white; padding:15px; width:100%; border:none; border-radius:10px; font-weight:bold; font-size:1.1rem;">
        Bestellung über WhatsApp abschicken 📲
    </button>
</div>
