 <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorrentino POS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="logo-screen">
    <h1 class="logo">SORRENTINO</h1>
</div>

<div id="welcome-screen">
    <h2>Tables</h2>
    <div class="grid" id="table-grid"></div>
</div>

<div id="menu-screen">

    <div class="nav-header">
        <span>Tisch <span id="selected-table"></span></span>
        <span>Total: <span id="cart-total">0.00</span>€</span>
    </div>

    <div class="category-bar">
        <div onclick="selectMain('Drinks')">Drinks</div>
        <div onclick="selectMain('Pizza')">Pizza</div>
        <div onclick="selectMain('Pasta')">Pasta</div>
    </div>

    <div id="food-list"></div>

    <div id="cart-preview"></div>

    <div class="checkout-bar">
        <button onclick="printReceipt()">Print</button>
        <button onclick="completeOrder()">Complete</button>
        <button onclick="resetTable()">Reset</button>
        <button onclick="goBack()">Back</button>
    </div>

</div>

<div id="receipt-area">
    <div class="receipt-box">
        <h2>SORRENTINO</h2>
        <p>Tisch <span id="r-table"></span></p>
        <div id="r-items"></div>
        <h3>Total: <span id="r-total"></span></h3>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
