 <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorrentino POS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGO SCREEN -->
<div id="logo-screen">
    <h1 class="logo">SORRENTINO</h1>
</div>

<!-- TABLE SCREEN -->
<div id="welcome-screen">
    <h1>SORRENTINO</h1>
    <p class="est">EST. 2019</p>
    <p>Wählen Sie Ihren Tisch</p>
    <div class="grid" id="table-grid"></div>
</div>

<!-- MENU SCREEN -->
<div id="menu-screen">

    <div class="nav-header">
        <span>Tisch <span id="selected-table"></span></span>
        <span>Total: <span id="cart-total">0.00</span>€</span>
    </div>

    <!-- MAIN CATEGORY -->
    <div class="category-bar" id="main-cats">
        <div onclick="selectMain('Drinks')">Drinks</div>
        <div onclick="selectMain('Salad')">Salad</div>
        <div onclick="selectMain('Pizza')">Pizza</div>
        <div onclick="selectMain('Special Pizza')">Special Pizza</div>
        <div onclick="selectMain('Pasta')">Pasta</div>
        <div onclick="selectMain('Dessert')">Dessert</div>
        <div onclick="selectMain('Al Forno')">Al Forno</div>
        <div onclick="selectMain('Vegan Pizza')">Vegan Pizza</div>
        <div onclick="selectMain('Vegan Pasta')">Vegan Pasta</div>
        <div onclick="selectMain('Vegan Al Forno')">Vegan Al Forno</div>
    </div>

    <!-- SUB CATEGORY -->
    <div class="category-bar" id="sub-cats"></div>

    <!-- FOOD LIST -->
    <div id="food-list"></div>

    <!-- CART PREVIEW -->
    <div id="cart-preview"></div>

    <!-- ACTIONS -->
    <div class="checkout-bar">
        <button onclick="printReceipt()">Print</button>
        <button onclick="downloadReceipt()">Download</button>
        <button onclick="shareReceipt()">Share</button>
        <button onclick="resetApp()">Reset</button>
    </div>

</div>

<!-- RECEIPT -->
<div id="receipt-area">
    <div class="receipt-box">
        <h2>SORRENTINO</h2>
        <p>Est. 2019</p>

        <div class="receipt-info">
            <span>Tisch: <b id="r-table"></b></span>
            <span id="r-date"></span>
        </div>

        <hr>

        <div id="r-items"></div>

        <hr>

        <div class="receipt-total">
            <span>TOTAL</span>
            <span id="r-total"></span>
        </div>

        <p class="thanks">Danke!</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
