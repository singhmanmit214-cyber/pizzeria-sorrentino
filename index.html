 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorrentino | Digital Menu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="tableSelection" class="screen">
        <div class="logo-container">
            <h1>SORRENTINO</h1>
            <p>PIZZERIA - TRATTORIA</p>
        </div>
        <h2 class="gold-text">Tisch wählen</h2>
        <div id="tableGrid" class="table-grid"></div>
    </div>

    <div id="menuContent" class="screen" style="display: none;">
        <header class="main-header">
            <div class="header-info">
                <span class="table-badge">Tisch <span id="activeTable">0</span></span>
            </div>
            <h2 class="logo-small">SORRENTINO</h2>
        </header>

        <nav class="category-nav">
            <button class="nav-btn" onclick="renderMenu('Antipasti')">Antipasti</button>
            <button class="nav-btn" onclick="renderMenu('Salate')">Salate</button>
            <button class="nav-btn" onclick="renderMenu('Pizza')">Pizza</button>
            <button class="nav-btn" onclick="renderMenu('Pasta')">Pasta</button>
            <button class="nav-btn" onclick="renderMenu('Vegan')">Vegan</button>
            <button class="nav-btn" onclick="renderMenu('Fleisch/Fisch')">Fleisch & Fisch</button>
            <button class="nav-btn" onclick="renderMenu('Dessert')">Dessert</button>
            <button class="nav-btn" onclick="renderMenu('Getränke')">Getränke</button>
        </nav>

        <div id="menuGrid" class="menu-container"></div>

        <div id="cartBar" class="cart-bar" onclick="openSummary()">
            <span><span id="cartCount">0</span> Artikel</span>
            <span><span id="totalPrice">0.00</span>€</span>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="receipt-header">
                <h3>SORRENTINO</h3>
                <p>Tisch <span id="summaryTable"></span></p>
            </div>
            <div id="rItems" class="receipt-items"></div>
            <div class="total-row">
                <span>Gesamt</span>
                <span id="rTotal">0.00</span>€
            </div>
            <button class="print-btn" onclick="printReceipt()">Beleg drucken / PDF</button>
            <button class="close-btn" onclick="closeModal()">Zurück</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
