 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorrentino POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="table-screen">
        <div style="text-align:center; padding:30px; color:var(--gold);">
            <h1 style="letter-spacing: 5px; margin: 0;">SORRENTINO</h1>
        </div>
        <div id="table-grid"></div>
    </div>

    <div id="menu-screen">
        <div class="menu-side">
            <div id="current-tisch-label" style="padding:15px; border-bottom:1px solid var(--gold); color:var(--gold); font-size:1.3rem; font-weight:bold;"></div>
            <div id="sub-nav"></div>
            <div id="menu-display"></div>
        </div>

        <div class="receipt-side">
            <h2 style="color:var(--gold); margin-top:0;">RECHNUNG</h2>
            <div id="order-list"></div>
            <div class="total-section">
                <span>TOTAL:</span>
                <span id="total-amount">0.00 €</span>
            </div>
            <button class="action-btn" onclick="printBon()">BELEG DRUCKEN</button>
            <button class="action-btn" style="background:#333; color:white;" onclick="renderTables()">ZURÜCK ZU TISCHEN</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
