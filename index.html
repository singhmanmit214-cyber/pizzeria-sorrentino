 <div id="table-screen" class="full-screen-overlay">
    <div class="header-bar">
        <button onclick="showHome()" class="nav-btn">← Home</button>
        <h2>Tisch wählen</h2>
    </div>
    <div id="table-grid" class="dynamic-grid">
        </div>
</div>

<div id="menu-screen" class="app-shell" style="display:none;">
    <aside class="left-nav">
        <div class="table-tag">TISCH <span class="table-number">1</span></div>
        <div class="nav-links">
            <button class="nav-item active" onclick="openCategory('ESSEN')">🍽️ Essen</button>
            <button class="nav-item" onclick="openCategory('GETRÄNKE')">🥤 Getränke</button>
            <button class="nav-item" onclick="openCategory('VEGAN')">🌿 Vegan</button>
        </div>
    </aside>

    <main class="content-area">
        <div class="search-sticky">
            <input type="text" placeholder="№ oder Name suchen..." onkeyup="searchMenu()">
            <nav id="sub-nav" class="horizontal-scroll"></nav>
        </div>
        <div id="menu-display" class="scrolling-items"></div>
    </main>

    <aside class="right-checkout">
        <h3>DEINE BESTELLUNG</h3>
        <div id="order-list" class="receipt-scroll"></div>
        <div class="checkout-footer">
            <div class="total-row"><span>TOTAL:</span><span id="total-val">0.00 €</span></div>
            <button class="confirm-btn" onclick="completeOrder()">Abschließen</button>
        </div>
    </aside>
</div>
