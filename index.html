 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorrentino POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen">
        <div class="logo">SORRENTINO</div>
        
        <div class="service-selector">
            <button class="svc-btn active" onclick="setService('HIER ESSEN')">HIER ESSEN (7%)</button>
            <button class="svc-btn" onclick="setService('TAKEAWAY')">TAKEAWAY (7%)</button>
            <button class="svc-btn" onclick="setService('LIEFERUNG')">LIEFERUNG (19%)</button>
        </div>

        <div class="table-container">
            <h2 class="purple-text">Tisch wählen</h2>
            <div id="table-grid" class="purple-grid"></div> 
        </div>
    </div>

    <div id="menu-screen" class="view-hidden">
        <div class="app-layout">
            
            <aside class="sidebar">
                <div class="side-logo">S</div>
                <nav>
                    <button class="nav-item" onclick="openCategory('ESSEN')">🍽️ ESSEN</button>
                    <button class="nav-item" onclick="openCategory('GETRÄNKE')">🥤 DRINKS</button>
                    <button class="nav-item" onclick="openCategory('VEGAN')">🌿 VEGAN</button>
                </nav>
                <button class="back-btn" onclick="location.reload()">← ZURÜCK</button>
            </aside>

            <main class="content">
                <header class="content-header">
                    <div class="info">
                        <h2>Tisch <span id="table-num-display">0</span></h2>
                        <span id="mode-label" class="badge">HIER ESSEN</span>
                    </div>
                </header>

                <div id="sub-nav" class="sub-nav-bar"></div>
                
                <div id="menu-display" class="item-grid"></div>
            </main>

            <section class="receipt-panel">
                <h3>Bestellung</h3>
                <div id="order-list" class="receipt-list"></div>
                
                <div class="receipt-footer">
                    <div class="tax-row">
                        <span id="tax-rate-text">MwSt (7%):</span>
                        <span id="tax-val">0.00 €</span>
                    </div>
                    <div class="total-row">
                        <span>GESAMT:</span>
                        <span id="total-val">0.00 €</span>
                    </div>
                    <button class="checkout-btn" onclick="completeOrder()">BESTELLEN</button>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
