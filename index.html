 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorrentino POS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="intro-screen">
        <div class="elegant-logo-container">
            <span class="est">EST 2016</span>
            <h1 class="main-title">SORRENTINO</h1>
            <p class="sub-title">CLEAN FOOD & GOOD TASTE</p>
        </div>
    </div>

    <div id="table-screen" style="display:none;">
        <div class="header-logo">SORRENTINO</div>
        <div class="status-legend">
            <span><i class="dot green"></i> Frei</span>
            <span><i class="dot red"></i> Aktiv</span>
            <span><i class="dot blue"></i> Bezahlt</span>
        </div>
        <div class="grid" id="table-grid"></div>
    </div>

    <div id="menu-screen" style="display:none;">
        <header class="pos-header">
            <button class="nav-back" onclick="showTableScreen()">← ZURÜCK</button>
            <div class="table-info">TISCH <span id="active-table-num">0</span></div>
            <div class="total-info"><span id="cart-total">0.00</span>€</div>
        </header>

        <div class="category-wrapper">
            <div class="category-scroll" id="cat-circles"></div>
        </div>

        <div class="main-content-layout">
            <div id="item-list" class="items-container"></div>

            <div id="receipt-live-view"></div>
        </div>

        <div class="action-footer">
            <button class="act-btn b-print" onclick="printReceipt()">DRUCKEN</button>
            <button class="act-btn b-pay" onclick="markAsPaid()">BEZAHLT</button>
            <button class="act-btn b-reset" onclick="clearTable()">LEEREN</button>
        </div>
    </div>

    <div id="print-area"></div>

    <script src="script.js"></script>
</body>
</html>
